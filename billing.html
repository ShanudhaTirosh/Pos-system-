<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Pro — Billing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="loading-overlay" id="pageLoader"><div style="text-align:center"><div class="spinner-amber" style="margin:0 auto 16px"></div></div></div>
<div class="app-shell">
  <nav class="sidebar" id="appSidebar"></nav>
  <div class="main-area">
    <div class="topbar" id="appTopbar"></div>
    <div class="page-content fade-in">

      <div class="section-header mb-4">
        <div>
          <h2 class="section-title">Billing</h2>
          <p style="color:var(--text-muted);font-size:13px;margin:0">Generate bills and process payments</p>
        </div>
      </div>

      <div class="row g-4">

        <!-- Left: Orders Ready for Billing -->
        <div class="col-lg-5">
          <div class="card-custom" style="padding:0;overflow:hidden">
            <div style="padding:14px 20px;border-bottom:1px solid var(--border-color);background:var(--bg-tertiary)">
              <div class="card-title">Orders Ready to Bill</div>
              <div class="card-subtitle">Select an order to generate bill</div>
            </div>
            <div style="overflow-y:auto;max-height:70vh" id="ordersToBill">
              <div class="empty-state" style="padding:32px">
                <div class="empty-state-icon">📋</div>
                <div>No served orders pending billing</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Bill Preview -->
        <div class="col-lg-7">
          <div class="card-custom" style="padding:0;overflow:hidden" id="billPreviewCard">
            <div style="padding:14px 20px;border-bottom:1px solid var(--border-color);background:var(--bg-tertiary)">
              <div class="card-title">Bill Preview</div>
              <div class="card-subtitle">Review and process payment</div>
            </div>
            <div style="padding:20px" id="billPreviewBody">
              <div class="empty-state" style="padding:40px">
                <div class="empty-state-icon">💳</div>
                <div>Select an order to preview bill</div>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- Bill History -->
      <div class="card-custom mt-4">
        <div class="section-header mb-3">
          <span class="card-title">Bill History</span>
          <div style="display:flex;gap:8px">
            <input type="text" class="form-control-custom" id="billSearch" placeholder="🔍 Search bills…" style="max-width:200px" oninput="filterBills()">
            <button class="btn-ghost" onclick="exportBills()">📥 Export CSV</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="table-custom">
            <thead>
              <tr><th>Bill #</th><th>Order</th><th>Type</th><th>Subtotal</th><th>Tax</th><th>Total</th><th>Method</th><th>Status</th><th>Time</th><th></th></tr>
            </thead>
            <tbody id="billHistoryBody">
              <tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:24px">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Receipt Print Modal -->
<div class="modal modal-custom fade" id="receiptModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">🧾 Receipt</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" style="background:#f5f5f5;padding:16px">
        <div class="receipt-wrapper" id="receiptContent"></div>
      </div>
      <div class="modal-footer no-print">
        <button class="btn-ghost" data-bs-dismiss="modal">Close</button>
        <button class="btn-accent" onclick="window.print()">🖨️ Print Receipt</button>
      </div>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal modal-custom fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-body" style="padding:24px;text-align:center">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div id="confirmMessage"></div>
        <div style="display:flex;gap:8px;margin-top:20px">
          <button class="btn-ghost" id="confirmCancelBtn" data-bs-dismiss="modal" style="flex:1">Cancel</button>
          <button class="btn-danger" id="confirmOkBtn" style="flex:1">Confirm</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

let servableOrders = [], allBills = [], selectedOrder = null;
let receiptModal;

requireAuth(user => {
  document.getElementById('appSidebar').innerHTML = getSidebarHTML(user.uid);
  document.getElementById('appTopbar').innerHTML = getTopbarHTML('Billing', 'Generate bills & receipts');
  setActiveNav();
  loadSidebarUser(user);
  receiptModal = new bootstrap.Modal(document.getElementById('receiptModal'));
  subscribeOrders();
  subscribeBills();
  document.getElementById('pageLoader').style.display = 'none';

  // Check URL param for pre-selected order
  const urlParams = new URLSearchParams(window.location.search);
  const orderParam = urlParams.get('order');
  if (orderParam) { setTimeout(() => selectOrderForBilling(orderParam), 1000); }
});

function subscribeOrders() {
  db.collection(Collections.ORDERS)
    .where('status', 'in', ['Served','Paid'])
    .orderBy('createdAt','desc')
    .onSnapshot(snap => {
      servableOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderOrdersToBill();
    }, err => Toast.error(err.message));
}

function subscribeBills() {
  db.collection(Collections.BILLS)
    .orderBy('createdAt','desc')
    .limit(100)
    .onSnapshot(snap => {
      allBills = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      filterBills();
    }, err => {});
}

function renderOrdersToBill() {
  const container = document.getElementById('ordersToBill');
  const pending = servableOrders.filter(o => o.status === 'Served');

  if (!pending.length) {
    container.innerHTML = `<div class="empty-state" style="padding:32px">
      <div class="empty-state-icon">✅</div><div>No orders pending billing</div></div>`;
    return;
  }

  container.innerHTML = pending.map(o => `
    <div onclick="selectOrderForBilling('${o.id}')"
      style="padding:14px 20px;border-bottom:1px solid var(--border-subtle);cursor:pointer;transition:var(--transition);
        ${selectedOrder?.id === o.id ? 'background:var(--accent-soft);border-left:3px solid var(--accent)' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700;font-family:var(--font-mono);font-size:13px">${fmt.orderId(o.id)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
            ${o.type} ${o.tableNumber ? `· Table ${o.tableNumber}` : ''} · ${(o.items||[]).reduce((s,i)=>s+i.qty,0)} items
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--accent)">$${(o.total||0).toFixed(2)}</div>
          <div style="font-size:11px;color:var(--text-muted)">${fmt.time(o.createdAt)}</div>
        </div>
      </div>
    </div>`).join('');
}

function selectOrderForBilling(orderId) {
  selectedOrder = servableOrders.find(o => o.id === orderId);
  if (!selectedOrder) return;
  renderOrdersToBill();
  renderBillPreview(selectedOrder);
}

function renderBillPreview(order) {
  const { subtotal, tax, total } = calcBillAmounts(order.subtotal || 0);
  const body = document.getElementById('billPreviewBody');

  body.innerHTML = `
    <div style="max-width:560px;margin:0 auto">
      <!-- Order Info -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-muted)">Order</div>
          <div style="font-family:var(--font-display);font-size:22px;font-weight:700">${fmt.orderId(order.id)}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:var(--text-muted)">${fmt.datetime(order.createdAt)}</div>
          <div style="margin-top:4px">${statusChip(order.type)}</div>
          ${order.tableNumber ? `<div style="font-size:12px;margin-top:4px">Table #${order.tableNumber}</div>` : ''}
          ${order.customerName ? `<div style="font-size:12px;margin-top:4px">👤 ${order.customerName}</div>` : ''}
        </div>
      </div>

      <!-- Items Table -->
      <div style="background:var(--bg-tertiary);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:20px">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="border-bottom:1px solid var(--border-color)">
              <th style="padding:10px 14px;text-align:left;font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Item</th>
              <th style="padding:10px 14px;text-align:center;font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Qty</th>
              <th style="padding:10px 14px;text-align:right;font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Price</th>
              <th style="padding:10px 14px;text-align:right;font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase">Total</th>
            </tr>
          </thead>
          <tbody>
            ${(order.items||[]).map(item => `
              <tr style="border-bottom:1px solid var(--border-subtle)">
                <td style="padding:10px 14px;font-size:13.5px">${item.name}</td>
                <td style="padding:10px 14px;text-align:center;font-size:13.5px">${item.qty}</td>
                <td style="padding:10px 14px;text-align:right;font-family:var(--font-mono);font-size:13px">$${(item.price||0).toFixed(2)}</td>
                <td style="padding:10px 14px;text-align:right;font-family:var(--font-mono);font-size:13px;font-weight:600">$${((item.price||0)*item.qty).toFixed(2)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>

      <!-- Totals -->
      <div style="background:var(--bg-tertiary);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px">
        <div class="total-row"><span>Subtotal</span><span class="mono">$${(order.subtotal||0).toFixed(2)}</span></div>
        <div class="total-row"><span>Tax (8%)</span><span class="mono">$${(order.tax||0).toFixed(2)}</span></div>
        <div style="height:1px;background:var(--border-color);margin:10px 0"></div>
        <div class="total-row grand"><span>Total Due</span><span class="mono amount">$${(order.total||0).toFixed(2)}</span></div>
      </div>

      <!-- Notes -->
      ${order.notes ? `<div style="padding:12px;background:var(--warning-soft);border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px">📝 ${order.notes}</div>` : ''}

      <!-- Payment -->
      <div style="background:var(--bg-tertiary);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px">
        <div class="form-label-custom">Payment Method</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap" id="paymentMethods">
          ${['Cash','Card','UPI','Wallet'].map(m=>`
            <button class="order-type-btn" data-pm="${m}" onclick="selectPaymentMethod('${m}',this)">${m}</button>
          `).join('')}
        </div>
        <div style="margin-top:12px">
          <label class="form-label-custom">Discount (%)</label>
          <input type="number" class="form-control-custom" id="discountPct" placeholder="0" min="0" max="100" style="max-width:120px" oninput="applyDiscount('${order.id}')">
        </div>
        <div id="discountedTotal" style="margin-top:10px;font-family:var(--font-display);font-size:18px;font-weight:700;display:none">
          After discount: <span style="color:var(--accent)" id="discountedTotalAmt"></span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn-accent" style="flex:1;justify-content:center;padding:12px" onclick="processBill('${order.id}')">
          ✅ Mark as Paid & Generate Bill
        </button>
        <button class="btn-ghost" style="padding:12px 16px" onclick="previewReceipt('${order.id}')">
          🖨️ Preview Receipt
        </button>
      </div>
    </div>`;

  // Auto-select first payment method
  setTimeout(() => {
    const firstBtn = document.querySelector('[data-pm]');
    if (firstBtn) selectPaymentMethod(firstBtn.dataset.pm, firstBtn);
  }, 50);
}

let selectedPaymentMethod = 'Cash';
function selectPaymentMethod(method, btn) {
  selectedPaymentMethod = method;
  document.querySelectorAll('[data-pm]').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function applyDiscount(orderId) {
  const order = servableOrders.find(o => o.id === orderId);
  if (!order) return;
  const pct  = parseFloat(document.getElementById('discountPct').value) || 0;
  if (pct > 0 && pct <= 100) {
    const discounted = order.total * (1 - pct / 100);
    document.getElementById('discountedTotal').style.display = 'block';
    document.getElementById('discountedTotalAmt').textContent = `$${discounted.toFixed(2)}`;
  } else {
    document.getElementById('discountedTotal').style.display = 'none';
  }
}

async function processBill(orderId) {
  const order = servableOrders.find(o => o.id === orderId);
  if (!order) return;

  const discountPct = parseFloat(document.getElementById('discountPct')?.value) || 0;
  const discountAmt = order.total * (discountPct / 100);
  const finalTotal  = order.total - discountAmt;

  const billData = {
    orderId,
    type:          order.type,
    items:         order.items,
    subtotal:      order.subtotal,
    tax:           order.tax,
    discount:      discountAmt,
    discountPct,
    total:         finalTotal,
    paymentMethod: selectedPaymentMethod,
    status:        'Paid',
    tableNumber:   order.tableNumber || null,
    customerName:  order.customerName || null,
    createdBy:     firebase.auth().currentUser.uid,
    createdAt:     firebase.firestore.FieldValue.serverTimestamp(),
    paidAt:        firebase.firestore.FieldValue.serverTimestamp(),
  };

  try {
    const billRef = await db.collection(Collections.BILLS).add(billData);
    await db.collection(Collections.ORDERS).doc(orderId).update({ status: 'Paid' });
    await logActivity('bill_paid', { billId: billRef.id, orderId, total: finalTotal });
    Toast.success(`Bill paid! ${fmt.orderId(billRef.id)}`);
    selectedOrder = null;
    document.getElementById('billPreviewBody').innerHTML = `
      <div class="empty-state" style="padding:40px">
        <div class="empty-state-icon">✅</div>
        <div>Bill processed successfully!</div>
        <button class="btn-accent" style="margin-top:16px" onclick="previewReceipt('${orderId}','${billRef.id}')">🖨️ Print Receipt</button>
      </div>`;
  } catch (e) {
    Toast.error('Failed: ' + e.message);
  }
}

function previewReceipt(orderId, billId) {
  const order = servableOrders.find(o => o.id === orderId);
  const bill  = allBills.find(b => b.id === billId || b.orderId === orderId);

  const source = bill || order;
  if (!source) { Toast.warning('Order not found'); return; }

  const items     = source.items || [];
  const subtotal  = source.subtotal || 0;
  const tax       = source.tax || 0;
  const discount  = source.discount || 0;
  const total     = source.total || 0;
  const method    = source.paymentMethod || 'Cash';

  document.getElementById('receiptContent').innerHTML = `
    <div class="receipt-header">
      <div style="font-size:18px;font-weight:700">🍽️ Restaurant Pro</div>
      <div style="font-size:11px">123 Main Street, City</div>
      <div style="font-size:11px">Tel: (555) 123-4567</div>
      <div style="font-size:11px;margin-top:4px">--------------------------------</div>
      <div style="font-size:11px">Order: ${fmt.orderId(orderId)}</div>
      ${source.tableNumber ? `<div style="font-size:11px">Table: #${source.tableNumber}</div>` : ''}
      ${source.customerName ? `<div style="font-size:11px">Customer: ${source.customerName}</div>` : ''}
      <div style="font-size:11px">${new Date().toLocaleString()}</div>
    </div>
    <div style="font-size:11px;margin:6px 0">--------------------------------</div>
    ${items.map(item => `
      <div class="receipt-row">
        <span>${item.name} ×${item.qty}</span>
        <span>$${(item.price * item.qty).toFixed(2)}</span>
      </div>`).join('')}
    <div class="receipt-total">
      <div class="receipt-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
      <div class="receipt-row"><span>Tax (8%)</span><span>$${tax.toFixed(2)}</span></div>
      ${discount > 0 ? `<div class="receipt-row"><span>Discount</span><span>-$${discount.toFixed(2)}</span></div>` : ''}
      <div class="receipt-row" style="font-weight:700;font-size:14px"><span>TOTAL</span><span>$${total.toFixed(2)}</span></div>
      <div class="receipt-row" style="font-size:11px"><span>Payment</span><span>${method}</span></div>
    </div>
    <div class="receipt-footer">
      <div style="font-size:12px;font-weight:700;margin-top:4px">THANK YOU!</div>
      <div style="font-size:11px">Please visit us again 😊</div>
      <div style="font-size:10px;margin-top:4px">Powered by Restaurant Pro</div>
    </div>`;

  receiptModal.show();
}

function filterBills() {
  const search = (document.getElementById('billSearch')?.value || '').toLowerCase();
  let bills = [...allBills];
  if (search) bills = bills.filter(b =>
    fmt.orderId(b.id).toLowerCase().includes(search) ||
    (b.paymentMethod||'').toLowerCase().includes(search) ||
    (b.customerName||'').toLowerCase().includes(search)
  );
  renderBillHistory(bills);
}

function renderBillHistory(bills) {
  const tbody = document.getElementById('billHistoryBody');
  if (!bills.length) {
    tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:24px">No bills yet</td></tr>`;
    return;
  }
  tbody.innerHTML = bills.map(b => `
    <tr>
      <td class="mono">${fmt.orderId(b.id)}</td>
      <td class="mono">${fmt.orderId(b.orderId)}</td>
      <td>${statusChip(b.type||'—')}</td>
      <td class="mono">$${(b.subtotal||0).toFixed(2)}</td>
      <td class="mono">$${(b.tax||0).toFixed(2)}</td>
      <td class="mono" style="color:var(--accent);font-weight:700">$${(b.total||0).toFixed(2)}</td>
      <td><span class="chip chip-info">${b.paymentMethod||'—'}</span></td>
      <td>${statusChip(b.status||'Paid')}</td>
      <td style="color:var(--text-muted)">${fmt.datetime(b.createdAt)}</td>
      <td>
        <button class="btn-ghost" style="padding:4px 10px;font-size:12px" onclick="previewReceipt('${b.orderId}','${b.id}')">
          🖨️ Receipt
        </button>
      </td>
    </tr>`).join('');
}

function exportBills() {
  const rows = [['Bill #','Order #','Type','Subtotal','Tax','Discount','Total','Payment','Status','Date']];
  allBills.forEach(b => rows.push([
    fmt.orderId(b.id), fmt.orderId(b.orderId), b.type,
    b.subtotal?.toFixed(2), b.tax?.toFixed(2), b.discount?.toFixed(2),
    b.total?.toFixed(2), b.paymentMethod, b.status, fmt.datetime(b.createdAt)
  ]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `bills_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  Toast.success('Bills exported!');
}
</script>
</body>
</html>
